!
! FRRouting configuration file
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!

router bgp 5

	! disable requirement of filtering policy
	no bgp ebgp-requires-policy

	! declare neighboring AS
	neighbor 192.0.2.21 remote-as 4
	neighbor 192.0.2.25 remote-as 3

	! IPv4 config
	address-family ipv4 unicast
		neighbor 192.0.2.21 activate
		neighbor 192.0.2.25 activate

		network 203.0.113.5/32
	exit-address-family

	! IPv6 config
	address-family ipv6 unicast
		neighbor 192.0.2.21 activate
		neighbor 192.0.2.25 activate

		network aa:5::/32
	exit-address-family

exit


segment-routing
srv6
	locators
		locator panbgp
		prefix aa:5::/32

exit
