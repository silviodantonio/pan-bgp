!
! FRRouting configuration file
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!
router bgp 3

	! disable requirement of filtering policy
	no bgp ebgp-requires-policy

	! declare neighboring AS
	neighbor 192.0.2.9 remote-as 2
	neighbor 192.0.2.26 remote-as 5

	! IPv4 config
	address-family ipv4 unicast
		neighbor 192.0.2.9 activate
		neighbor 192.0.2.26 activate

		network 192.0.2.12/30
		network 203.0.113.3/32
	exit-address-family

	! IPv6 config
	address-family ipv6 unicast
		neighbor 192.0.2.9 activate
		neighbor 192.0.2.26 activate

		network 2001:db8:1:3::/64
	exit-address-family

exit


segment-routing
srv6
	locators
		locator panbgp
		prefix 2001:db8:1:3::/64

exit
