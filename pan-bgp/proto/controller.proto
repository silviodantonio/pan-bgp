syntax = "proto3";

service ControllerMessagingService {
  rpc SendASInfo(ASInfo) returns (ResponseStatus) {}
  rpc RequestPath(RequestPathMessage) returns (Paths) {}
  rpc SendBGPPaths(BGPPaths) returns (ResponseStatus) {}
}

message ASInfo {
  uint32 local_as = 1;
  string identity_prefix = 2;
  repeated string prefix_list = 3;
}

message RequestPathMessage {
  Destination destination = 1;
  Policy policy = 2;
  uint32 number_of_paths = 3;
}

message Destination {
  uint32 local_as = 1;
  string dest_prefix = 2;
}

message Policy {
  string policy = 1;
}

message ASPath {
  repeated uint32 as_path = 1;
}

message Paths{
  repeated ASPath paths = 1;
}

message ResponseStatus {
  string status = 1;
}

message BGPPaths {
  uint32 local_as = 1;
  repeated BGPPath bgp_paths = 2;
}

message BGPPath {
  string dest_prefix = 1;
  repeated uint32 as_path = 2;
  repeated Metadata metadata = 3;
}

message Metadata {
  string key = 1;
  string value = 2;
}
