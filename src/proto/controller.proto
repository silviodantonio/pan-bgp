syntax = "proto3";

service ControllerMessagingService {
  rpc SendASInfo(ASInfo) returns (ResponseStatus) {}
  rpc RequestPath(Destination) returns (Paths) {}
}

message ASInfo {
  uint32 local_as = 1;
  repeated uint32 remote_as_list = 2;
  repeated string prefix_list = 3;
}

message ASPath {
  repeated uint32 as_path = 1;
}

message Paths{
  repeated ASPath paths = 1;
}

message Destination {
  uint32 local_as = 1;
  string dest_prefix = 2;
}

message ResponseStatus {
  string status = 1;
}
