syntax = "proto3";

service ControllerMessagingService {
  rpc SendNeighborsASN(ASList) returns (ResponseStatus) {}
  rpc SendPrefixes(PrefixList) returns (ResponseStatus) {}
}

message ASList {
  uint32 local_as = 1;
  repeated uint32 remote_as_list = 2;
}

message PrefixList {
  uint32 local_as = 1;
  repeated string prefix_list = 2;
}

message ResponseStatus {
  string status = 1;
}
